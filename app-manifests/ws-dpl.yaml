apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-dpl
spec:
  replicas: 1
  selector:
    matchLabels:
      part: web-server
  template:
    metadata:
      labels:
        part: web-server
    spec:
      containers:
        - name: web-server
          image: nginx
          ports:
            - containerPort: 80
          volumeMounts:
          - name: nginx-conf-vl
            mountPath: /etc/nginx/conf.d/default.conf
            subPath: nginx.conf
      volumes:
      - name: nginx-conf-vl
        configMap:
          name: ws-configmap